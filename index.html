<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mira — Email Campaign Report · March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal-dark: #003B44;
    --teal-mid: #005360;
    --cyan: #00CAD8;
    --cyan-light: #e0f9fb;
    --cyan-mid: #7de8ef;
    --ink: #0d1f22;
    --ink-2: #4a6569;
    --ink-3: #8aa8ad;
    --surface: #f4fafb;
    --card: #ffffff;
    --border: rgba(0,59,68,0.1);
    --border-strong: rgba(0,59,68,0.18);
  }
  html { font-size: 16px; }
  body { background: var(--surface); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 400; line-height: 1.6; min-height: 100vh; }
  .page { max-width: 960px; margin: 0 auto; padding: 0 0 5rem; }

  /* topbar */
  .topbar { background: var(--teal-dark); padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between; height: 68px; margin-bottom: 2.5rem; }
  .topbar img { height: 26px; display: block; }
  .topbar-right { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.05em; }

  /* hero */
  .hero { padding: 0 2.5rem 2rem; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border-strong); margin-bottom: 2rem; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cyan); margin-bottom: 8px; }
  .hero h1 { font-size: 38px; font-weight: 300; line-height: 1.1; color: var(--teal-dark); margin-bottom: 8px; letter-spacing: -0.5px; }
  .hero h1 strong { font-weight: 500; }
  .hero-sub { font-size: 14px; color: var(--ink-2); }
  .hero-right { text-align: right; }
  .hero-date { font-size: 32px; font-weight: 300; color: var(--teal-dark); line-height: 1; margin-bottom: 8px; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--cyan-light); color: var(--teal-dark); font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0,202,216,0.3); }
  .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); }

  /* content */
  .content { padding: 0 2.5rem; }

  /* section label */
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* kpi */
  .kpi-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 2.5rem; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 18px; position: relative; overflow: hidden; }
  .kpi::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--cyan); border-radius: 12px 12px 0 0; }
  .kpi.accent::after { background: var(--teal-dark); }
  .kpi-label { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; }
  .kpi-value { font-size: 34px; font-weight: 300; color: var(--teal-dark); line-height: 1; margin-bottom: 6px; letter-spacing: -0.5px; }
  .kpi-value span { font-size: 18px; font-weight: 400; }
  .kpi-note { font-size: 12px; color: var(--ink-3); }
  .kpi-note.good { color: #0a8a78; font-weight: 500; }

  /* charts */
  .charts-grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 14px; margin-bottom: 14px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px 22px 18px; }
  .chart-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
  .chart-desc { font-size: 12px; color: var(--ink-3); margin-bottom: 14px; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-2); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* note strip */
  .note-strip { background: var(--cyan-light); border: 1px solid rgba(0,202,216,0.25); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--teal-dark); margin-bottom: 1.75rem; display: flex; gap: 10px; align-items: flex-start; }
  .note-icon { width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); color: var(--teal-dark); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

  /* divider */
  .section-divider { border: none; border-top: 1px solid var(--border-strong); margin: 2.5rem 0; }

  /* totals summary strip */
  .totals-strip { background: var(--teal-dark); border-radius: 12px; padding: 22px 28px; display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 0; margin-bottom: 2.5rem; }
  .totals-item { padding: 0 20px; border-right: 1px solid rgba(255,255,255,0.1); }
  .totals-item:first-child { padding-left: 0; }
  .totals-item:last-child { border-right: none; }
  .totals-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
  .totals-value { font-size: 26px; font-weight: 300; color: #fff; line-height: 1; letter-spacing: -0.5px; }
  .totals-value span { font-size: 14px; }
  .totals-value.highlight { color: var(--cyan); }

  /* table */
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 2.5rem; }
  .table-card table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table-card thead { background: var(--teal-dark); }
  .table-card th { text-align: left; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); padding: 12px 14px; }
  .table-card td { padding: 13px 14px; color: var(--ink); border-bottom: 1px solid var(--border); vertical-align: middle; }
  .table-card tr:last-child td { border-bottom: none; }
  .table-card tbody tr:hover td { background: var(--surface); }
  .seq-badge { display: inline-flex; background: var(--cyan-light); color: var(--teal-dark); font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; border: 1px solid rgba(0,202,216,0.3); }
  .seq-done { background: var(--teal-dark); color: #fff; border-color: var(--teal-dark); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-track { width: 56px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .demo-badge { display: inline-flex; background: var(--cyan-light); color: var(--teal-dark); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--cyan); }
  .dash { color: var(--ink-3); }

  /* insights */
  .insights { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 3rem; }
  .insight { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .insight-num { font-size: 28px; font-weight: 300; color: var(--cyan); line-height: 1; margin-bottom: 8px; letter-spacing: -0.5px; }
  .insight-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
  .insight-body { font-size: 12px; color: var(--ink-2); line-height: 1.5; }

  /* footer */
  .footer-bar { background: var(--teal-dark); padding: 1.25rem 2.5rem; display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  .footer-bar img { height: 20px; opacity: 0.75; }
  .footer-bar span { font-size: 12px; color: rgba(255,255,255,0.4); }

  @media (max-width: 640px) {
    .topbar, .hero, .content { padding-left: 1.25rem; padding-right: 1.25rem; }
    .kpi-row { grid-template-columns: repeat(2,1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .insights { grid-template-columns: 1fr; }
    .totals-strip { grid-template-columns: repeat(2,1fr); gap: 16px; }
    .totals-item { border-right: none; padding: 0; }
    .hero { flex-direction: column; gap: 1.25rem; align-items: flex-start; }
    .footer-bar { padding: 1rem 1.25rem; }
  }
</style>
</head>
